<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Management | HealthFirst</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'med-blue': '#007BFF',
                        'soft-teal': '#20c997',
                        'dark-bg': '#0f172a',
                    },
                    fontFamily: { sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            background-image: radial-gradient(circle at 0% 0%, #1e293b 0%, transparent 50%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="antialiased">
    <header class="h-20 glass border-b border-slate-700/50 flex items-center justify-between px-8 sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="admin.html" class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-gray-400 hover:text-white transition">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-2xl font-bold tracking-wide">Queue Command Center</h1>
        </div>
        <div id="live-badge" class="text-sm text-soft-teal font-semibold flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-soft-teal animate-pulse"></div> Live System
        </div>
    </header>

    <main class="p-4 md:p-12 max-w-4xl mx-auto">
        <div class="glass rounded-[2.5rem] p-8 md:p-12 text-center relative overflow-hidden shadow-2xl">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-med-blue/10 rounded-full blur-3xl"></div>
            
            <h2 class="text-3xl font-bold mb-8">Reception Controller</h2>

            <!-- Doctor Selection -->
            <div class="max-w-md mx-auto mb-10 text-left">
                <label class="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-widest ml-1">Managing Clinic For:</label>
                <select id="active-doctor-id" onchange="loadDoctorState()" class="w-full bg-slate-800 border border-slate-600 text-white rounded-2xl p-4 text-lg font-semibold focus:outline-none focus:border-med-blue transition shadow-xl">
                    <option value="" disabled selected>Select a Doctor...</option>
                </select>
            </div>

            <!-- State Display -->
            <div id="control-panel" class="hidden animate-in fade-in duration-500">
                <div class="mb-12">
                    <span class="text-gray-500 uppercase tracking-widest text-sm font-bold">Now Serving</span>
                    <div class="text-[120px] font-black text-white leading-none mt-4" id="now-serving-number">--</div>
                    <div id="doctor-status-badge" class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold mt-4 border">
                        ACTIVE
                    </div>
                </div>

                <!-- Main Actions -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <button onclick="nextPatient()" class="p-8 rounded-3xl bg-med-blue hover:bg-blue-600 text-white shadow-lg shadow-blue-500/30 transition-all flex flex-col items-center gap-3 group">
                        <i class="fas fa-user-plus text-4xl group-hover:scale-110 transition"></i>
                        <span class="font-bold text-xl">Next Patient</span>
                    </button>
                    <button onclick="finishConsultation()" class="p-8 rounded-3xl bg-soft-teal/10 text-soft-teal border border-soft-teal/30 hover:bg-soft-teal hover:text-white transition-all flex flex-col items-center gap-3 group">
                        <i class="fas fa-check-double text-4xl group-hover:scale-110 transition"></i>
                        <span class="font-bold text-xl">Finish / Clear</span>
                    </button>
                </div>

                <!-- Status Toggles -->
                <div class="grid grid-cols-2 gap-4">
                    <button id="emergency-btn" onclick="toggleStatus('Emergency')" class="p-4 rounded-2xl border transition-all font-bold flex items-center justify-center gap-2">
                        <i class="fas fa-exclamation-triangle"></i> Emergency
                    </button>
                    <button id="break-btn" onclick="toggleStatus('Break/Prayer')" class="p-4 rounded-2xl border transition-all font-bold flex items-center justify-center gap-2">
                        <i class="fas fa-coffee"></i> Break / Prayer
                    </button>
                </div>

                <!-- Timer -->
                <div id="timer-container" class="mt-10 hidden">
                    <div class="bg-slate-800/50 rounded-2xl p-6 border border-slate-700">
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Session Progress</p>
                        <div id="countdown-display" class="text-5xl font-mono font-bold text-white">00:00</div>
                        <div class="w-full bg-slate-700 h-1.5 rounded-full mt-4 overflow-hidden">
                            <div id="timer-progress" class="bg-med-blue h-full transition-all duration-1000" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="py-20 text-gray-500">
                <i class="fas fa-id-card-alt text-6xl mb-4 opacity-20"></i>
                <p class="text-xl">Please select a doctor clinic to begin management.</p>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://dftaeukzveskufccpqgs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_FIXtJFY25jQUG0Y4YiAvPQ_B3BN_vSg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let activeDoctor = null;
        let currentAppointment = null;
        let timerInterval = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            fetchDoctors();
            initRealtime();
        });

        async function fetchDoctors() {
            const { data } = await supabase.from('doctors').select('id, name');
            const select = document.getElementById('active-doctor-id');
            if (data) {
                data.forEach(doc => {
                    const opt = document.createElement('option');
                    opt.value = doc.id;
                    opt.textContent = doc.name;
                    select.appendChild(opt);
                });
            }
        }

        async function loadDoctorState() {
            const id = document.getElementById('active-doctor-id').value;
            if (!id) return;

            const { data: doc } = await supabase.from('doctors').select('*').eq('id', id).single();
            activeDoctor = doc;

            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('control-panel').classList.remove('hidden');

            updateUI();
            fetchCurrentServing();
        }

        async function fetchCurrentServing() {
            const today = new Date().toISOString().split('T')[0];
            const { data } = await supabase
                .from('appointments')
                .select('*')
                .eq('doctor_id', activeDoctor.id)
                .eq('appointment_date', today)
                .in('status', ['Serving', 'Calling'])
                .order('started_at', { ascending: false })
                .limit(1)
                .maybeSingle();
            
            currentAppointment = data;
            document.getElementById('now-serving-number').innerText = data ? String(data.slot_number).padStart(2, '0') : '--';
            
            if (data && data.started_at) {
                resumeTimer(data);
            } else {
                stopTimer();
            }
        }

        function updateUI() {
            const status = activeDoctor.status;
            const badge = document.getElementById('doctor-status-badge');
            const eBtn = document.getElementById('emergency-btn');
            const bBtn = document.getElementById('break-btn');

            badge.innerText = status.toUpperCase();
            
            // Reset buttons
            [eBtn, bBtn].forEach(b => {
                b.className = "p-4 rounded-2xl border transition-all font-bold flex items-center justify-center gap-2 ";
            });

            if (status === 'Emergency') {
                badge.className = "inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold mt-4 border bg-red-500/10 text-red-400 border-red-500/30";
                eBtn.classList.add('bg-red-500', 'text-white', 'border-red-500');
                bBtn.classList.add('bg-slate-800/50', 'text-gray-500', 'border-slate-700');
            } else if (status === 'Break/Prayer') {
                badge.className = "inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold mt-4 border bg-amber-500/10 text-amber-400 border-amber-500/30";
                bBtn.classList.add('bg-amber-500', 'text-white', 'border-amber-500');
                eBtn.classList.add('bg-slate-800/50', 'text-gray-500', 'border-slate-700');
            } else {
                badge.className = "inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold mt-4 border bg-green-500/10 text-green-400 border-green-500/20";
                eBtn.classList.add('bg-slate-800/50', 'text-red-400', 'border-red-500/30');
                bBtn.classList.add('bg-slate-800/50', 'text-amber-400', 'border-amber-500/30');
            }
        }

        async function toggleStatus(targetStatus) {
            if (!activeDoctor) return;
            const current = activeDoctor.status;
            const newStatus = current === targetStatus ? 'Active' : targetStatus;
            
            let expectedReturn = null;
            if (newStatus === 'Emergency') expectedReturn = prompt("Return time?");

            const { error } = await supabase.from('doctors').update({ status: newStatus, emergency_expected_return: expectedReturn }).eq('id', activeDoctor.id);
            if (!error) {
                activeDoctor.status = newStatus;
                updateUI();
                Toastify({ text: `Status changed to ${newStatus}`, style: { background: "#20c997" } }).showToast();
            }
        }

        async function nextPatient() {
            if (!activeDoctor) return;
            const today = new Date().toISOString().split('T')[0];

            // 1. Mark current as Served if exists
            if (currentAppointment) await finishConsultation();

            // 2. Find next verified
            const { data: next } = await supabase
                .from('appointments')
                .select('*')
                .eq('doctor_id', activeDoctor.id)
                .eq('appointment_date', today)
                .eq('status', 'verified')
                .order('slot_number', { ascending: true })
                .limit(1)
                .maybeSingle();

            if (!next) {
                Toastify({ text: "No verified patients left for this doctor.", style: { background: "#6b7280" } }).showToast();
                return;
            }

            // 3. Update Status and started_at
            const now = new Date().toISOString();
            await supabase.from('appointments').update({ status: 'Serving', started_at: now }).eq('id', next.id);
            
            // 4. Update Global Queue for display chime
            await supabase.from('clinic_status').update({ current_number: next.slot_number }).eq('doctor_id', 'global');

            fetchCurrentServing();
            Toastify({ text: "Calling Patient #" + next.slot_number, style: { background: "#007BFF" } }).showToast();
        }

        async function finishConsultation() {
            if (!currentAppointment) return;
            await supabase.from('appointments').update({ status: 'Served' }).eq('id', currentAppointment.id);
            currentAppointment = null;
            document.getElementById('now-serving-number').innerText = '--';
            stopTimer();
            Toastify({ text: "Session finished.", style: { background: "#20c997" } }).showToast();
        }

        function resumeTimer(appt) {
            const start = new Date(appt.started_at).getTime();
            const duration = (activeDoctor.consultation_duration_minutes || 15) * 60 * 1000;
            const end = start + duration;
            
            document.getElementById('timer-container').classList.remove('hidden');
            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const diff = end - now;
                
                if (diff <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('countdown-display').innerText = "00:00";
                    document.getElementById('timer-progress').style.width = '0%';
                    Toastify({ text: "⏰ Session Time Expired!", duration: 10000, style: { background: "#ef4444" } }).showToast();
                    return;
                }

                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('countdown-display').innerText = `${m}:${s.toString().padStart(2, '0')}`;
                document.getElementById('timer-progress').style.width = (diff / duration * 100) + '%';
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('timer-container').classList.add('hidden');
        }

        function initRealtime() {
            supabase.channel('queue_mgr')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'doctors' }, payload => {
                    if (activeDoctor && payload.new.id === activeDoctor.id) {
                        activeDoctor = payload.new;
                        updateUI();
                    }
                })
                .subscribe();
        }
    </script>
</body>
</html>
