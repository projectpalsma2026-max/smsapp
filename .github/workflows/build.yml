name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Force Clean Dependencies
        run: |
          cd sms-gateway
          # Halkan waxaan ku tirtiraynaa lock-faylka si mishiinka GitHub uusan 'npm ci' u isticmaalin
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: 🚀 Build APK
        run: |
          cd sms-gateway
          # Waxaan dhismaha ku bilaabaynaa 'local' si uu u isticmaalo node_modules-ka aan hadda rakibnay
          eas build --platform android --profile development --local --non-interactive --clear-cache
              - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: android/app/build/outputs/apk/release/app-release.apk # Hubi in path-kan uu sax yahay
