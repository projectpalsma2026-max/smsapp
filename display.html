<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Doctor Queue Display | HealthFirst Hospital</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --emerald: #10b981;
            --emerald-glow: rgba(16, 185, 129, 0.4);
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-400: #94a3b8;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--slate-900);
            color: var(--white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 123, 255, 0.05) 0%, transparent 40%);
        }

        /* Top Bar */
        .top-bar {
            height: 8vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .brand-logo {
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, var(--emerald), #34d399);
            border-radius: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 0 30px var(--emerald-glow);
        }

        .brand-name {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .clock-container { text-align: right; }
        #clock { font-size: 2.5rem; font-weight: 700; }
        #date { font-size: 1rem; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; }

        /* Layout Grid */
        .main-workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 2fr 1.2fr;
            gap: 2rem;
            padding: 2rem 3rem;
            overflow: hidden;
        }

        /* Left Panel: Big Now Serving */
        .serving-panel {
            background: linear-gradient(135deg, var(--glass), rgba(16, 185, 129, 0.05));
            border: 2px solid var(--glass-border);
            border-radius: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.2);
        }

        .panel-header {
            position: absolute;
            top: 5rem;
            font-size: 3rem;
            font-weight: 700;
            color: var(--emerald);
            text-transform: uppercase;
            letter-spacing: 0.6em;
            opacity: 0.8;
        }

        .big-ticket {
            font-size: 42rem;
            font-weight: 950;
            line-height: 0.7;
            color: #fff;
            text-shadow: 0 30px 120px rgba(0,0,0,0.6);
            margin-top: 4rem;
            letter-spacing: -0.05em;
        }

        .panel-footer {
            position: absolute;
            bottom: 5rem;
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: rgba(16, 185, 129, 0.2);
            padding: 1.5rem 5rem;
            border-radius: 100px;
            border: 3px solid var(--emerald);
            box-shadow: 0 0 40px var(--emerald-glow);
        }

        /* Right Panel: Doctor List */
        .doctor-list-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .doctor-list-panel::-webkit-scrollbar { width: 6px; }
        .doctor-list-panel::-webkit-scrollbar-thumb { background: var(--slate-700); border-radius: 10px; }

        .doctor-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .doctor-card.active-card {
            border-color: var(--emerald);
            background: rgba(16, 185, 129, 0.05);
        }

        .doc-info { display: flex; align-items: center; gap: 1.5rem; }
        .doc-img { width: 5rem; height: 5rem; border-radius: 1.2rem; object-fit: cover; border: 2px solid var(--slate-700); }
        .doc-name { font-size: 1.6rem; font-weight: 700; color: #fff; }
        .doc-spec { font-size: 1rem; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }

        .doc-ticket {
            text-align: center;
            background: var(--slate-800);
            padding: 0.8rem 1.5rem;
            border-radius: 1.5rem;
            min-width: 8rem;
        }
        .doc-ticket-label { font-size: 0.8rem; color: var(--slate-400); text-transform: uppercase; margin-bottom: 0.2rem; }
        .doc-ticket-num { font-size: 2.5rem; font-weight: 800; color: var(--emerald); line-height: 1; }

        /* Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #overlay.active { opacity: 1; visibility: visible; }
        .overlay-title { font-size: 4rem; font-weight: 700; color: var(--emerald); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 1rem; }
        .overlay-ticket { font-size: 45rem; font-weight: 950; line-height: 0.8; color: #fff; text-shadow: 0 0 80px var(--emerald-glow); }
        .overlay-desc { font-size: 6rem; font-weight: 800; color: #fff; margin-top: 2rem; background: rgba(255,255,255,0.05); padding: 1rem 4rem; border-radius: 100px; border: 2px solid var(--emerald); text-align: center; }
        .overlay-doc { font-size: 3rem; color: var(--slate-400); margin-top: 1rem; font-weight: 500; }

        @keyframes zoomOutSlide {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0.6) translateY(-40vh); opacity: 0; }
        }
        .animate-call-out { animation: zoomOutSlide 1.2s cubic-bezier(0.64, 0, 0.78, 0) forwards; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">
            <div class="brand-logo">H</div>
            <div class="brand-name">HEALTHFIRST HOSPITAL</div>
        </div>
        <div class="clock-container">
            <div id="clock">00:00:00</div>
            <div id="date">MONDAY, JANUARY 1</div>
        </div>
    </div>

    <div class="main-workspace">
        <!-- Main Stage -->
        <div class="serving-panel">
            <div class="panel-header">Now Serving</div>
            <div class="big-ticket" id="main-ticket">00</div>
            <div class="panel-footer" id="main-room">PLEASE PROCEED</div>
        </div>

        <!-- Doctor Grid -->
        <div class="doctor-list-panel" id="doctor-list">
            <!-- Populated dynamically -->
            <div class="info-label" style="font-size: 1.2rem; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 1rem;">Clinical Station Status</div>
        </div>
    </div>

    <!-- Call-In Overlay -->
    <div id="overlay">
        <div class="overlay-title">Now Calling</div>
        <div class="overlay-ticket" id="ov-ticket">00</div>
        <div class="overlay-desc" id="ov-doc">DR. NAME</div>
        <div class="overlay-doc">PLEASE PROCEED TO CONSULTATION</div>
    </div>

    <audio id="chime" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const SUPABASE_URL = 'https://dftaeukzveskufccpqgs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_FIXtJFY25jQUG0Y4YiAvPQ_B3BN_vSg';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const mainTicketEl = document.getElementById('main-ticket');
        const mainRoomEl = document.getElementById('main-room');
        const ovTicketEl = document.getElementById('ov-ticket');
        const ovDocEl = document.getElementById('ov-doc');
        const overlay = document.getElementById('overlay');
        const doctorListEl = document.getElementById('doctor-list');
        const chime = document.getElementById('chime');

        let isAnimating = false;
        let lastCalledId = null;
        let doctorsCache = {};

        // --- Clock ---
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        }
        setInterval(updateTime, 1000); updateTime();

        // --- Data ---
        async function initDisplay() {
            // 1. Fetch Doctors
            const { data: docs } = await supabase.from('doctors').select('*').order('id');
            doctorsCache = {};
            docs.forEach(d => doctorsCache[d.id] = d);
            
            await refreshState();
        }

        async function refreshState() {
            const today = new Date().toISOString().split('T')[0];
            
            // 1. Get Global Status
            const { data: statusData } = await supabase.from('clinic_status').select('current_number').eq('doctor_id', 'global').single();
            const currentNum = statusData ? statusData.current_number : 0;
            mainTicketEl.innerText = String(currentNum).padStart(2, '0');

            // 2. Fetch Latest 'Calling' or 'Served' for each doctor to show their "current"
            const { data: appts } = await supabase
                .from('appointments')
                .select('doctor_id, slot_number, status')
                .eq('appointment_date', today)
                .in('status', ['Calling', 'Served', 'Active'])
                .order('slot_number', { ascending: false });

            // Group by doctor
            const docStatus = {};
            appts.forEach(a => {
                if (!docStatus[a.doctor_id]) docStatus[a.doctor_id] = a.slot_number;
            });

            // 3. Render Doctor List
            renderDoctorList(docStatus);
        }

        function renderDoctorList(docStatus) {
            const header = `<div class="info-label" style="font-size: 1.2rem; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 1rem;">Station Status</div>`;
            doctorListEl.innerHTML = header;

            Object.values(doctorsCache).forEach(doc => {
                const currentVal = docStatus[doc.id] || '--';
                const isActive = currentVal !== '--';
                
                doctorListEl.innerHTML += `
                    <div class="doctor-card ${isActive ? 'active-card' : ''}">
                        <div class="doc-info">
                            <img src="${doc.image_url}" class="doc-img">
                            <div>
                                <div class="doc-name">${doc.name}</div>
                                <div class="doc-spec">${doc.specialty}</div>
                            </div>
                        </div>
                        <div class="doc-ticket">
                            <div class="doc-ticket-label">Current</div>
                            <div class="doc-ticket-num">${String(currentVal).padStart(2, '0')}</div>
                        </div>
                    </div>
                `;
            });
        }

        // --- Sequence ---
        async function triggerAlert(ticket, doctorId) {
            if (isAnimating) return;
            isAnimating = true;

            const doc = doctorsCache[doctorId] || { name: 'MEDICAL STAFF' };
            
            ovTicketEl.innerText = String(ticket).padStart(2, '0');
            ovDocEl.innerText = doc.name.toUpperCase();
            
            chime.play().catch(e => console.warn(e));
            overlay.classList.add('active');

            setTimeout(() => {
                ovTicketEl.classList.add('animate-call-out');
                setTimeout(() => {
                    mainTicketEl.innerText = String(ticket).padStart(2, '0');
                    mainRoomEl.innerText = `PROCEED TO ${doc.name.toUpperCase()}`;
                    overlay.classList.remove('active');
                    ovTicketEl.classList.remove('animate-call-out');
                    refreshState();
                    isAnimating = false;
                }, 1200);
            }, 15000);
        }

        // --- Realtime ---
        function initRealtime() {
            supabase
                .channel('display_sync')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'appointments' }, payload => {
                    console.log("Realtime Update Received:", payload);
                    const newRow = payload.new;
                    
                    if (newRow.status === 'Calling' && newRow.id !== lastCalledId) {
                        console.log("Triggering Alert for ticket:", newRow.slot_number);
                        lastCalledId = newRow.id;
                        triggerAlert(newRow.slot_number, newRow.doctor_id);
                    } else {
                        refreshState();
                    }
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'appointments' }, () => refreshState())
                .subscribe((status) => {
                    console.log('Supabase Realtime Status:', status);
                });
        }

        initDisplay();
        initRealtime();
        document.body.addEventListener('click', () => { chime.play().then(() => { chime.pause(); chime.currentTime = 0; }); }, { once: true });
    </script>
</body>
</html>
