<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Doctor Queue Display | HealthFirst Hospital</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'med-blue': '#007BFF',
                        'soft-teal': '#20c997',
                        'slate-900': '#0f172a',
                        'slate-800': '#1e293b',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(32, 201, 151, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 123, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 1) 0%, #020617 100%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .glass-active {
            background: linear-gradient(135deg, rgba(32, 201, 151, 0.1), rgba(0, 123, 255, 0.05));
            border-color: rgba(32, 201, 151, 0.4);
            box-shadow: 0 0 30px rgba(32, 201, 151, 0.15);
        }

        .big-ticket-text {
            font-size: clamp(8rem, 20vw, 22rem);
            line-height: 0.9;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
            letter-spacing: -0.05em;
        }

        .overlay-ticket-text {
            font-size: clamp(10rem, 25vw, 28rem);
            line-height: 0.9;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #20c997 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 80px rgba(32, 201, 151, 0.5));
        }

        /* Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.95) 0%, #020617 100%);
            backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #overlay.active {
            opacity: 1;
            visibility: visible;
        }

        @keyframes zoomOutSlide {
            0% {
                transform: scale(1) translateY(0);
                opacity: 1;
                filter: blur(0px);
            }

            40% {
                transform: scale(1.1) translateY(0);
                opacity: 1;
                filter: blur(0px);
            }

            100% {
                transform: scale(0.5) translateY(-50vh);
                opacity: 0;
                filter: blur(20px);
            }
        }

        .animate-call-out {
            animation: zoomOutSlide 1.5s cubic-bezier(0.64, 0, 0.78, 0) forwards;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 40px rgba(32, 201, 151, 0.2);
            }

            50% {
                box-shadow: 0 0 80px rgba(32, 201, 151, 0.5);
                border-color: rgba(32, 201, 151, 0.8);
            }
        }

        .pulse-border {
            animation: pulse-glow 3s infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
    </style>
</head>

<body class="antialiased">

    <!-- Top Bar -->
    <header class="h-[8vh] glass-panel border-b border-white/10 flex items-center justify-between px-10 z-50">
        <div class="flex items-center gap-4">
            <div
                class="w-12 h-12 rounded-xl bg-gradient-to-tr from-med-blue to-soft-teal flex items-center justify-center text-white text-2xl shadow-[0_0_20px_rgba(32,201,151,0.4)]">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>
            <h1
                class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 uppercase">
                HealthFirst Hospital
            </h1>
        </div>
        <div class="text-right flex flex-col items-end">
            <div id="clock" class="text-4xl font-bold tracking-wider font-mono">00:00:00</div>
            <div id="date" class="text-sm font-semibold text-soft-teal tracking-widest uppercase">MONDAY, JANUARY 1
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 p-8 flex gap-8 h-[92vh] overflow-hidden">

        <!-- Left: Now Serving Big Display -->
        <section
            class="flex-[2] relative rounded-[3rem] glass-panel pulse-border flex flex-col items-center justify-center overflow-hidden group py-12">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-soft-teal/5"></div>

            <div class="text-soft-teal text-3xl md:text-5xl font-bold tracking-[0.5em] uppercase opacity-80 z-10 mb-6">
                Now Serving
            </div>

            <div class="z-10 transition-transform duration-700 ease-out mb-8 flex-1 flex items-center"
                id="main-ticket-container">
                <div class="big-ticket-text" id="main-ticket">00</div>
            </div>

            <div class="z-10 w-3/4 flex justify-center mt-auto">
                <div
                    class="bg-slate-800/80 border-2 border-soft-teal/50 rounded-full py-5 px-8 text-center shadow-[0_0_40px_rgba(32,201,151,0.2)] backdrop-blur-md transition-all duration-500 w-full max-w-2xl">
                    <span
                        class="text-2xl md:text-4xl font-extrabold uppercase tracking-widest text-white block w-full whitespace-nowrap overflow-hidden text-ellipsis"
                        id="main-room">
                        PLEASE PROCEED
                    </span>
                </div>
            </div>
        </section>

        <!-- Right: Doctor Stations List -->
        <aside class="flex-[1] flex flex-col gap-6">
            <div class="flex items-center gap-3 px-2">
                <div class="w-3 h-3 rounded-full bg-soft-teal animate-pulse"></div>
                <h2 class="text-xl font-bold text-gray-300 uppercase tracking-widest">Clinical Stations</h2>
            </div>

            <div class="flex-1 overflow-y-auto pr-2 flex flex-col gap-4" id="doctor-list">
                <!-- Populated Dynamically -->
            </div>
        </aside>
    </main>

    <!-- Overlay "Now Calling" -->
    <div id="overlay">
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-soft-teal/20 rounded-full blur-[100px] animate-pulse">
            </div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-med-blue/20 rounded-full blur-[100px] animate-pulse"
                style="animation-delay: 1s;"></div>
        </div>

        <div class="z-10 flex flex-col items-center">
            <div class="text-soft-teal text-4xl md:text-6xl font-black tracking-[0.3em] uppercase mb-4 animate-bounce">
                Now Calling
            </div>
            <div class="overlay-ticket-text drop-shadow-2xl" id="ov-ticket">00</div>

            <div class="mt-8 bg-white/10 border border-white/20 rounded-full px-12 py-4 backdrop-blur-xl">
                <div class="text-4xl md:text-6xl font-bold text-white uppercase tracking-wider text-center" id="ov-doc">
                    DR. NAME
                </div>
            </div>

            <div class="mt-6 text-xl md:text-2xl text-gray-400 font-medium tracking-widest uppercase">
                Please proceed to consultation
            </div>
        </div>
    </div>

    <!-- Audio Chime -->
    <audio id="chime" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const SUPABASE_URL = 'https://dftaeukzveskufccpqgs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_FIXtJFY25jQUG0Y4YiAvPQ_B3BN_vSg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const mainTicketEl = document.getElementById('main-ticket');
        const mainRoomEl = document.getElementById('main-room');
        const ovTicketEl = document.getElementById('ov-ticket');
        const ovDocEl = document.getElementById('ov-doc');
        const overlay = document.getElementById('overlay');
        const doctorListEl = document.getElementById('doctor-list');
        const chime = document.getElementById('chime');

        let isAnimating = false;
        let lastCalledNum = 0;
        let doctorsCache = {};

        // Clock Sync
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        }
        setInterval(updateTime, 1000); updateTime();

        // Data Init
        async function initDisplay() {
            const { data: docs } = await supabase.from('doctors').select('*').order('id');
            doctorsCache = {};
            if (docs) docs.forEach(d => doctorsCache[d.id] = d);
            await refreshState(true);
        }

        async function refreshState(isInitialLoad = false) {
            const today = new Date().toISOString().split('T')[0];

            const { data: statusData } = await supabase.from('clinic_status').select('current_number').eq('doctor_id', 'global').single();
            const currentNum = statusData ? statusData.current_number : 0;

            if (isInitialLoad) {
                lastCalledNum = currentNum;
                mainTicketEl.innerText = String(currentNum).padStart(2, '0');
            }

            const { data: appts } = await supabase
                .from('appointments')
                .select('doctor_id, slot_number, status')
                .eq('appointment_date', today)
                .in('status', ['Calling', 'Served', 'Active'])
                .order('slot_number', { ascending: false });

            const docStatus = {};
            if (appts) {
                appts.forEach(a => {
                    if (!docStatus[a.doctor_id]) docStatus[a.doctor_id] = a.slot_number;
                });
            }

            renderDoctorList(docStatus);
        }

        function renderDoctorList(docStatus) {
            doctorListEl.innerHTML = '';
            Object.values(doctorsCache).forEach(doc => {
                const currentVal = docStatus[doc.id] || '--';
                const isActive = currentVal !== '--';
                const numDisplay = currentVal !== '--' ? String(currentVal).padStart(2, '0') : '--';

                const cardClass = isActive ? 'glass-panel glass-active' : 'glass-panel opacity-60 grayscale-[50%]';
                const textHighlight = isActive ? 'text-soft-teal' : 'text-gray-500';

                doctorListEl.innerHTML += `
                    <div class="${cardClass} rounded-2xl p-4 flex items-center justify-between transition-all duration-500">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-xl overflow-hidden border-2 border-slate-600 shadow-lg shrink-0 bg-slate-800">
                                <img src="${doc.image_url}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-white whitespace-nowrap overflow-hidden text-ellipsis max-w-[200px]">${doc.name}</h3>
                                <p class="text-sm text-gray-400 font-semibold tracking-wider uppercase">${doc.specialty}</p>
                            </div>
                        </div>
                        <div class="flex flex-col items-center bg-slate-900/80 rounded-xl px-5 py-2 border border-white/5 shadow-inner">
                            <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest mb-1">Serving</span>
                            <span class="text-3xl font-black ${textHighlight} leading-none">${numDisplay}</span>
                        </div>
                    </div>
                `;
            });
        }

        // Overlay Animation
        async function triggerAlert(ticket, doctorId) {
            if (isAnimating) return;
            isAnimating = true;

            const doc = doctorsCache[doctorId] || { name: 'MEDICAL STAFF' };
            const paddedTicket = String(ticket).padStart(2, '0');

            ovTicketEl.innerText = paddedTicket;
            ovDocEl.innerText = doc.name.toUpperCase();

            // Interaction might block audio, catch and ignore safely
            try { await chime.play(); } catch (e) { console.log('Audio requires user interaction first.'); }

            overlay.classList.add('active');

            // Hold overlay for 10 seconds before animating out
            setTimeout(() => {
                ovTicketEl.classList.add('animate-call-out');

                // Update Main board while overlay hides
                setTimeout(() => {
                    mainTicketEl.innerText = paddedTicket;
                    mainRoomEl.innerText = `PROCEED TO ${doc.name.toUpperCase()}`;

                    // Simple pop animation for main board update
                    const container = document.getElementById('main-ticket-container');
                    container.style.transform = 'scale(1.1)';
                    setTimeout(() => container.style.transform = 'scale(1)', 300);

                    overlay.classList.remove('active');
                    ovTicketEl.classList.remove('animate-call-out');
                    refreshState();
                    isAnimating = false;
                }, 1200);
            }, 10000);
        }

        async function checkForNewPatient(newNum) {
            if (newNum > 0 && newNum !== lastCalledNum) {
                lastCalledNum = newNum;

                const today = new Date().toISOString().split('T')[0];
                const { data: appt } = await supabase
                    .from('appointments')
                    .select('doctor_id')
                    .eq('slot_number', newNum)
                    .eq('appointment_date', today)
                    .order('id', { ascending: false })
                    .limit(1)
                    .maybeSingle();

                const docId = appt ? appt.doctor_id : null;
                triggerAlert(newNum, docId);
            }
        }

        function initRealtime() {
            supabase
                .channel('display_sync')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'clinic_status' }, payload => {
                    if (payload.new.doctor_id === 'global') {
                        checkForNewPatient(payload.new.current_number);
                    }
                })
                .subscribe();

            // Fallback Polling for high availability
            setInterval(async () => {
                if (isAnimating) return;
                const { data } = await supabase
                    .from('clinic_status')
                    .select('current_number')
                    .eq('doctor_id', 'global')
                    .maybeSingle();

                if (data && data.current_number !== lastCalledNum) {
                    checkForNewPatient(data.current_number);
                } else {
                    refreshState();
                }
            }, 5000);
        }

        // Initialize Audio unlocking by user click (optional requirement for TVs)
        document.body.addEventListener('click', () => {
            chime.play().then(() => { chime.pause(); chime.currentTime = 0; }).catch(e => { });
        }, { once: true });

        initDisplay().then(initRealtime);
    </script>
</body>

</html>
