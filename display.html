<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Display | HealthFirst Hospital</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#0056b3',
                        'brand-light-blue': '#007BFF',
                        'brand-teal': '#20c997',
                        'bg-soft': '#f3f8fc',
                        'text-dark': '#1e293b',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'premium-hover': '0 20px 40px -10px rgba(0,123,255,0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f3f8fc;
            color: #1e293b;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23007BFF" fill-opacity="0.03"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border-radius: 2rem;
        }

        .main-ticket-number {
            font-size: clamp(8rem, 25vh, 25rem);
            line-height: 0.9;
            font-weight: 800;
            color: #0056b3;
            letter-spacing: -0.04em;
        }

        /* Smooth Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(243, 248, 252, 0.95);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden;
            transition: all 0.5s ease-in-out;
        }

        #overlay.active { opacity: 1; visibility: visible; }
        
        @keyframes slideUpFade {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        .animate-in { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .animate-blink {
            animation: blink 1s infinite;
        }

        @keyframes soft-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.98); opacity: 0.9; }
        }
        .animate-soft-pulse {
            animation: soft-pulse 2s infinite ease-in-out;
        }
        
        .emergency-card {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header -->
    <header class="h-[10vh] bg-white shadow-sm flex items-center justify-between px-10 z-50 relative">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 rounded-2xl bg-brand-light-blue flex items-center justify-center text-white text-3xl shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-plus"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-text-dark">HealthFirst</h1>
                <p class="text-sm font-semibold text-gray-500 uppercase tracking-widest">Medical Center</p>
            </div>
        </div>
        <div class="text-right flex items-center gap-6">
            <div class="text-right border-r border-gray-200 pr-6">
                <div id="date" class="text-sm font-bold text-gray-500 uppercase tracking-wider">MONDAY, JANUARY 1</div>
                <div class="text-brand-light-blue font-medium text-xs">Queue Live Sync</div>
            </div>
            <div id="clock" class="text-5xl font-bold tracking-tight text-text-dark font-mono">00:00:00</div>
        </div>
    </header>

    <!-- Content -->
    <main class="flex-1 p-8 flex gap-8 h-[90vh] overflow-hidden max-w-[1920px] mx-auto w-full">
        
        <!-- Left: Now Serving Big Display -->
        <section class="flex-[1.5] glass-card flex flex-col items-center justify-center relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -top-32 -left-32 w-96 h-96 bg-blue-50 rounded-full blur-3xl opacity-60"></div>
            
            <div class="z-10 text-center w-full px-8">
                <div class="inline-block px-6 py-2 bg-blue-50 text-brand-blue rounded-full text-xl font-bold tracking-widest uppercase mb-6 border border-blue-100 shadow-sm">
                    Now Serving
                </div>
                
                <div class="transition-transform duration-500 ease-out flex items-center justify-center" id="main-ticket-container">
                    <div class="main-ticket-number drop-shadow-sm" id="main-ticket">00</div>
                </div>
                
                <div class="mt-8 bg-brand-blue text-white rounded-2xl py-6 px-10 shadow-premium w-full mx-auto border-4 border-white">
                    <p class="text-sm text-blue-200 uppercase font-bold tracking-widest mb-1">Please proceed to</p>
                    <h2 class="text-4xl md:text-5xl font-extrabold uppercase tracking-wide truncate" id="main-room">
                        WAITING AREA
                    </h2>
                </div>
            </div>
        </section>

        <!-- Right: Doctor Stations List -->
        <aside class="flex-[1] flex flex-col h-full bg-white rounded-[2rem] shadow-premium border border-gray-100 overflow-hidden">
            <div class="px-8 py-6 border-b border-gray-100 bg-gray-50/50">
                <h2 class="text-2xl font-bold text-text-dark flex items-center gap-3">
                    <i class="fas fa-user-md text-brand-light-blue"></i> Clinic Status
                </h2>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-4" id="doctor-list">
                <!-- Populated Dynamically -->
            </div>
        </aside>
    </main>

    <!-- Footer Ticker -->
    <footer class="h-[6vh] bg-brand-blue text-white flex items-center overflow-hidden relative z-50 border-t-4 border-white">
        <div class="bg-brand-dark flex items-center px-6 h-full z-10 shadow-lg font-bold uppercase tracking-tighter text-sm whitespace-nowrap bg-[#004494]">
            Announcements
        </div>
        <div class="flex-1 relative h-full flex items-center">
            <div id="ticker-content" class="animate-marquee font-medium tracking-wide text-lg">
                Loading hospital announcements...
            </div>
        </div>
    </footer>

    <!-- Overlay "Now Calling" -->
    <div id="overlay">
        <div class="glass-card p-16 max-w-4xl w-full mx-4 text-center shadow-2xl border-2 border-white relative overflow-hidden">
            <!-- decorative -->
            <div class="absolute top-0 left-0 w-full h-2 bg-brand-light-blue"></div>
            
            <div class="text-brand-light-blue text-3xl font-bold tracking-[0.2em] uppercase mb-4" id="ov-title">
                New Patient Call
            </div>
            
            <div class="text-[clamp(8rem,25vh,20rem)] font-extrabold text-text-dark leading-none my-4 tracking-tight" id="ov-ticket">
                00
            </div>
            
            <div class="mt-8 bg-gray-50 rounded-2xl py-6 px-8 border border-gray-100 inline-block min-w-[300px]">
                <p class="text-gray-500 font-semibold uppercase tracking-wider text-sm mb-1">Assigned Doctor</p>
                <div class="text-4xl font-bold text-brand-blue uppercase" id="ov-doc">
                    DR. NAME
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Chime -->
    <audio id="chime" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const SUPABASE_URL = 'https://dftaeukzveskufccpqgs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_FIXtJFY25jQUG0Y4YiAvPQ_B3BN_vSg';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const mainTicketEl = document.getElementById('main-ticket');
        const mainRoomEl = document.getElementById('main-room');
        const ovTicketEl = document.getElementById('ov-ticket');
        const ovDocEl = document.getElementById('ov-doc');
        const overlay = document.getElementById('overlay');
        const doctorListEl = document.getElementById('doctor-list');
        const chime = document.getElementById('chime');

        let isAnimating = false;
        let lastCalledNum = 0;
        let doctorsCache = {};

        // Clock Sync
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        }
        setInterval(updateTime, 1000); updateTime();

        // Data Init
        async function initDisplay() {
            await fetchTicker();
            await refreshState(true);
        }

        async function fetchTicker() {
            const { data } = await supabaseClient.from('settings').select('value').eq('key', 'ticker_text').single();
            if (data) document.getElementById('ticker-content').innerText = data.value;
        }

        async function refreshState(isInitialLoad = false) {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const currentDayIndex = now.getDay();
            
            // 1. Fetch Global Status
            const { data: statusData } = await supabaseClient.from('clinic_status').select('current_number').eq('doctor_id', 'global').single();
            const currentNum = statusData ? statusData.current_number : 0;
            
            if (isInitialLoad) {
                lastCalledNum = currentNum;
                mainTicketEl.innerText = String(currentNum).padStart(2, '0');
            }

            // 2. Fetch Active Doctors for TODAY
            const { data: schedules } = await supabaseClient
                .from('doctor_schedule')
                .select('doctor_id')
                .eq('day_index', currentDayIndex)
                .eq('is_active', true);
            
            const activeDocIds = schedules ? schedules.map(s => s.doctor_id) : [];

            if (activeDocIds.length === 0) {
                renderDoctorList({});
                return;
            }

            const { data: doctors } = await supabaseClient
                .from('doctors')
                .select('*')
                .in('id', activeDocIds)
                .neq('status', 'Inactive')
                .order('id');
            
            doctorsCache = {};
            if (doctors) doctors.forEach(d => doctorsCache[d.id] = d);

            const { data: appts } = await supabaseClient
                .from('appointments')
                .select('doctor_id, slot_number, status')
                .eq('appointment_date', todayStr)
                .in('status', ['verified', 'Serving', 'Calling'])
                .order('slot_number', { ascending: true });

            const doctorNowNext = {};
            doctors.forEach(d => doctorNowNext[d.id] = { now: '--', next: '--' });

            if (appts) {
                appts.forEach(a => {
                    const status = doctorNowNext[a.doctor_id];
                    if (!status) return;
                    if (a.status === 'Serving' || a.status === 'Calling') {
                        status.now = a.slot_number;
                    } else if (a.status === 'verified' && status.next === '--') {
                        status.next = a.slot_number;
                    }
                });
            }

            renderDoctorList(doctorNowNext);
        }

        function renderDoctorList(docStatus) {
            doctorListEl.innerHTML = '';
            const docs = Object.values(doctorsCache);
            
            if(docs.length === 0) {
                doctorListEl.innerHTML = '<div class="text-center text-gray-400 py-10">No active doctors scheduled for today.</div>';
                return;
            }

            const now = new Date();
            const currentTimeStr = now.toTimeString().split(' ')[0]; // HH:mm:ss

            docs.forEach(doc => {
                const statusInfo = docStatus[doc.id] || { now: '--', next: '--' };
                const isEmergency = doc.status === 'Emergency';
                const isBreak = doc.status === 'Break/Prayer';
                const isPaused = doc.status === 'Paused';
                
                const nowDisplay = statusInfo.now !== '--' ? String(statusInfo.now).padStart(2, '0') : '--';
                const nextDisplay = statusInfo.next !== '--' ? String(statusInfo.next).padStart(2, '0') : '--';
                
                let cardClass = "border-2 rounded-2xl p-4 flex items-center justify-between transition-all duration-300 hover:shadow-md ";
                let statusBadgeClass = "absolute bottom-0 right-0 w-4 h-4 border-2 border-white rounded-full ";
                let mainTextColor = "text-brand-blue";
                let statusSubText = `<p class="text-xs text-gray-500 font-semibold tracking-wider uppercase">${doc.specialty}</p>`;

                if (isEmergency) {
                    cardClass += "emergency-card animate-pulse";
                    statusBadgeClass += "bg-red-500";
                    mainTextColor = "text-red-600";
                    statusSubText = `<p class="text-xs font-black text-red-600 animate-blink uppercase tracking-tighter">EMERGENCY - PLEASE WAIT${doc.emergency_expected_return ? `<br><span class="text-[10px]">Return: ${doc.emergency_expected_return}</span>` : ''}</p>`;
                } else if (isBreak) {
                    cardClass += "break-card animate-soft-pulse";
                    statusBadgeClass += "bg-amber-500";
                    mainTextColor = "text-amber-600";
                    statusSubText = `<p class="text-xs font-black text-amber-600 uppercase tracking-tighter">BREAK / PRAYER</p>`;
                } else if (isPaused) {
                    cardClass += "bg-slate-50 border-slate-200 opacity-90";
                    statusBadgeClass += "bg-slate-400";
                    mainTextColor = "text-slate-600";
                } else {
                    cardClass += "border-brand-light-blue bg-blue-50/30 shadow-sm";
                    statusBadgeClass += "bg-brand-teal";
                }

                // Dynamic Now Text Logic
                let ticketNowDisplay = nowDisplay;
                if (nowDisplay === '--' && !isEmergency && !isBreak && !isPaused) {
                    if (currentTimeStr < doc.start_time) {
                        ticketNowDisplay = `<span class="text-sm font-bold opacity-60">Starts at ${doc.start_time.slice(0, 5)}</span>`;
                    } else {
                        ticketNowDisplay = `<span class="text-sm font-bold opacity-60">Soon</span>`;
                    }
                }
                
                doctorListEl.innerHTML += `
                    <div class="${cardClass}">
                        <div class="flex items-center gap-4">
                            <div class="relative">
                                <div class="w-14 h-14 rounded-full overflow-hidden border-2 border-white shadow-sm shrink-0 bg-gray-100">
                                    <img src="${doc.image_url}" class="w-full h-full object-cover">
                                </div>
                                <div class="${statusBadgeClass}"></div>
                            </div>
                            <div class="max-w-[200px]">
                                <h3 class="text-lg font-bold text-text-dark whitespace-nowrap overflow-hidden text-ellipsis">${doc.name}</h3>
                                ${statusSubText}
                            </div>
                        </div>
                        <div class="flex flex-col items-end pr-2">
                            <div class="flex gap-4">
                                <div class="text-center min-w-[60px]">
                                    <span class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block">Now</span>
                                    <span class="text-3xl font-black ${mainTextColor} leading-none flex items-center justify-center h-8">${ticketNowDisplay}</span>
                                </div>
                                <div class="text-center border-l border-gray-200 pl-4 min-w-[60px]">
                                    <span class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block">Next</span>
                                    <span class="text-2xl font-bold text-gray-400 leading-none h-8 flex items-center justify-center">${nextDisplay}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Overlay Animation
        async function triggerAlert(ticket, doctorId) {
            if (isAnimating) return;
            isAnimating = true;

            const doc = doctorsCache[doctorId] || { name: 'MEDICAL STAFF' };
            const paddedTicket = String(ticket).padStart(2, '0');
            
            ovTicketEl.innerText = paddedTicket;
            ovDocEl.innerText = doc.name.toUpperCase();
            
            // Interaction might block audio, catch and ignore safely
            try { await chime.play(); } catch(e) { console.log('Audio requires user interaction first.'); }
            
            // reset animation classes
            overlay.classList.add('active');
            const card = overlay.querySelector('.glass-card');
            card.classList.remove('animate-in');
            void card.offsetWidth; // trigger reflow
            card.classList.add('animate-in');

            // Hold overlay before animating out
            setTimeout(() => {
                overlay.classList.remove('active');
                
                // Update Main board
                setTimeout(() => {
                    mainTicketEl.innerText = paddedTicket;
                    mainRoomEl.innerText = doc.name.toUpperCase();
                    
                    // Simple pop animation for main board update
                    const container = document.getElementById('main-ticket-container');
                    container.style.transform = 'scale(1.05)';
                    setTimeout(() => container.style.transform = 'scale(1)', 300);

                    refreshState();
                    isAnimating = false;
                }, 400); // Wait for overlay to fade out
            }, 8000); // Display overlay for 8 seconds
        }

        async function checkForNewPatient(newNum) {
            if (newNum > 0 && newNum !== lastCalledNum) {
                lastCalledNum = newNum;
                
                const today = new Date().toISOString().split('T')[0];
                const { data: appt } = await supabaseClient
                    .from('appointments')
                    .select('doctor_id')
                    .eq('slot_number', newNum)
                    .eq('appointment_date', today)
                    .order('id', { ascending: false })
                    .limit(1)
                    .maybeSingle();

                const docId = appt ? appt.doctor_id : null;
                triggerAlert(newNum, docId);
            }
        }

        function initRealtime() {
            supabaseClient
                .channel('display_sync')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'clinic_status' }, payload => {
                    if (payload.new.doctor_id === 'global') {
                        checkForNewPatient(payload.new.current_number);
                    }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'doctors' }, payload => {
                    refreshState();
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'appointments' }, payload => {
                    refreshState();
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'settings', filter: 'key=eq.ticker_text' }, payload => {
                    document.getElementById('ticker-content').innerText = payload.new.value;
                })
                .subscribe();

            // Fallback Polling for high availability
            setInterval(async () => {
                if(isAnimating) return;
                const { data } = await supabaseClient
                    .from('clinic_status')
                    .select('current_number')
                    .eq('doctor_id', 'global')
                    .maybeSingle();
                
                if (data && data.current_number !== lastCalledNum) {
                    checkForNewPatient(data.current_number);
                } else {
                    refreshState();
                }
            }, 5000);
        }

        // Initialize Audio unlocking by user click (optional requirement for TVs)
        document.body.addEventListener('click', () => { 
            chime.play().then(() => { chime.pause(); chime.currentTime = 0; }).catch(e=>{}); 
        }, { once: true });

        initDisplay().then(initRealtime);
    </script>
</body>
</html>
